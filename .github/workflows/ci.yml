name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint-and-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run smoke e2e
        run: npm run test:e2e
        env:
          CI: "true"
          NEXT_PUBLIC_FIREBASE_API_KEY: "placeholder"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "placeholder.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "placeholder"
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: "placeholder.appspot.com"
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "1234567890"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:1234567890:web:placeholder"
          NEXT_PUBLIC_SITE_URL: "http://127.0.0.1:3000"
